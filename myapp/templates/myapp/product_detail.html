<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>
    <style>
        .out-of-stock {
            color: red;
            font-weight: bold;
        }
        button:disabled {
            background-color: #ccc;
        }
    </style>
</head>
<body>

<h1>{{ product.name }}</h1>

<p>
    Stock: <strong id="stock">{{ product.stock }}</strong>
</p>

<input type="number" id="qty" value="1" min="1">
<button id="buy">Buy</button>

<script>
    const productId = "{{ product.id }}";
    const socket = new WebSocket(
        `ws://${window.location.host}/ws/stock/`
    );

    const stockEl = document.getElementById("stock");
    const buyButton = document.getElementById("buy");
    const qtyInput = document.getElementById("qty");

    socket.onmessage = function (e) {
        const data = JSON.parse(e.data);

        if (data.type === "stock_update") {
            stockEl.innerText = data.stock;
            updateBuyButtonState(data.stock);
        }

        if (data.type === "error") {
            alert(data.message);
        }
    };

    // Update the "Buy" button state based on stock availability
    function updateBuyButtonState(stock) {
        if (stock <= 0) {
            buyButton.disabled = true;
            stockEl.classList.add('out-of-stock');
            stockEl.innerText = "Out of Stock";
        } else {
            buyButton.disabled = false;
            stockEl.classList.remove('out-of-stock');
        }
    }

    // Handle Buy Button Click
    document.getElementById("buy").onclick = function () {
        const qty = parseInt(qtyInput.value);

        // Check if quantity is available in stock
        if (qty <= 0) {
            alert("Quantity must be greater than 0.");
            return;
        }

        const stock = parseInt(stockEl.innerText);
        if (qty > stock) {
            alert("Not enough stock available!");
            return;
        }

        // Send the quantity to the server through WebSocket
        socket.send(JSON.stringify({
            action: "buy",
            quantity: qty
        }));

        // Optional: Disable button and show loading until response
        buyButton.disabled = true;
        buyButton.innerText = "Processing...";
    };
</script>

</body>
</html>
